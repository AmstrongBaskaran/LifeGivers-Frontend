<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Givers - Register</title>
  <link rel="stylesheet" href="../css/signin.css" />
</head>

<body>
  <div class="signin_container">
    <h3>Welcome To Life Givers</h3>
    <h6>Register Your Account</h6>

    <form class="s_container2">
      <div class="form-group">
        <label for="fullname">Full Name:</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
        <span id="fullname-error" class="error-message"></span>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required />
        <span id="phone-error" class="error-message"></span>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
        <span id="password-error" class="error-message"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password"
          required />
        <span id="confirmPassword-error" class="error-message"></span>
      </div>

      <div class="form-group">
        <label for="role">Account Type:</label>
        <select id="role" name="role" class="form-control"
          style="width: 100%; padding: 12px; border: 1.5px solid #e1e4e8; border-radius: 8px; background: #f8f9fa; font-family: inherit;">
          <option value="user" selected>User</option>
        </select>
      </div>

      <button type="submit" id="signin_btn">Sign Up</button>
    </form>
  </div>
  <script src="../js/signin.js"></script>
</body>
</html>
